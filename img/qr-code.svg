<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <rect width="300" height="300" fill="#FFFFFF" rx="12" stroke="#E1F5EE" stroke-width="4" />
  
  <!-- Outer QR frame -->
  <rect x="40" y="40" width="220" height="220" fill="none" stroke="#0F6E56" stroke-width="2" rx="8" />
  
  <!-- QR Code corners -->
  <!-- Top Left -->
  <rect x="60" y="60" width="40" height="40" fill="#0F6E56" />
  <rect x="70" y="70" width="20" height="20" fill="#FFFFFF" />
  <rect x="75" y="75" width="10" height="10" fill="#0F6E56" />
  
  <!-- Top Right -->
  <rect x="200" y="60" width="40" height="40" fill="#0F6E56" />
  <rect x="210" y="70" width="20" height="20" fill="#FFFFFF" />
  <rect x="215" y="75" width="10" height="10" fill="#0F6E56" />
  
  <!-- Bottom Left -->
  <rect x="60" y="200" width="40" height="40" fill="#0F6E56" />
  <rect x="70" y="210" width="20" height="20" fill="#FFFFFF" />
  <rect x="75" y="215" width="10" height="10" fill="#0F6E56" />

  <!-- Mock QR pixels/blocks -->
  <rect x="120" y="60" width="10" height="20" fill="#1D9E75" />
  <rect x="140" y="70" width="20" height="10" fill="#0F6E56" />
  <rect x="170" y="60" width="10" height="30" fill="#1D9E75" />
  
  <rect x="120" y="90" width="30" height="10" fill="#0F6E56" />
  <rect x="160" y="100" width="10" height="20" fill="#1D9E75" />
  
  <rect x="60" y="120" width="20" height="10" fill="#0F6E56" />
  <rect x="90" y="110" width="10" height="30" fill="#1D9E75" />
  <rect x="110" y="130" width="40" height="10" fill="#0F6E56" />
  <rect x="160" y="130" width="20" height="20" fill="#1D9E75" />
  <rect x="190" y="110" width="10" height="40" fill="#0F6E56" />
  
  <rect x="210" y="120" width="30" height="10" fill="#1D9E75" />
  <rect x="220" y="140" width="20" height="30" fill="#0F6E56" />
  
  <rect x="120" y="160" width="10" height="40" fill="#0F6E56" />
  <rect x="140" y="170" width="30" height="10" fill="#1D9E75" />
  <rect x="180" y="160" width="10" height="30" fill="#0F6E56" />
  
  <rect x="60" y="180" width="30" height="10" fill="#1D9E75" />
  <rect x="100" y="170" width="10" height="20" fill="#0F6E56" />
  
  <rect x="120" y="210" width="40" height="10" fill="#1D9E75" />
  <rect x="170" y="200" width="20" height="20" fill="#0F6E56" />
  <rect x="200" y="210" width="10" height="30" fill="#1D9E75" />
  
  <rect x="140" y="230" width="30" height="10" fill="#0F6E56" />
  
  <!-- BHIM UPI Logo center representation -->
  <rect x="125" y="125" width="50" height="50" fill="#FFFFFF" rx="4" stroke="#0F6E56" stroke-width="2" />
  <text x="150" y="155" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="900" fill="#0F6E56">M</text>
</svg>
