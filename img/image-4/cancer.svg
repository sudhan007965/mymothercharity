<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <rect width="600" height="450" fill="#FFFFFF" />
  <rect width="560" height="410" x="20" y="20" fill="#E1F5EE" rx="8" />
  <circle cx="300" cy="200" r="80" fill="#0F6E56" opacity="0.1" />
  
  <!-- Cancer ribbon (Lavender/Pink or Gold) - Let's use standard pink/lavender ribbon or primary green ribbon to represent our trust's campaign -->
  <g transform="translate(300, 200) scale(1.2)">
    <path d="M -20 60 C -20 60, -40 20, -10 -20 C 10 -50, 40 -40, 40 -10 C 40 10, 10 30, -30 70" stroke="#0F6E56" stroke-width="16" stroke-linecap="round" fill="none" />
    <path d="M 20 60 C 20 60, 40 20, 10 -20 C -10 -50, -40 -40, -40 -10 C -40 10, -10 30, 30 70" stroke="#1D9E75" stroke-width="12" stroke-linecap="round" fill="none" />
  </g>
  
  <text x="300" y="340" text-anchor="middle" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#0F6E56">Cancer Awareness &amp; Screening</text>
  <text x="300" y="370" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#1D9E75">Early Detection &amp; Patient Support</text>
</svg>
