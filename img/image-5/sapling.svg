<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <rect width="600" height="450" fill="#FFFFFF" />
  <rect width="560" height="410" x="20" y="20" fill="#E1F5EE" rx="8" />
  <circle cx="300" cy="200" r="80" fill="#0F6E56" opacity="0.1" />
  
  <!-- Sapling/Plant in hands -->
  <g transform="translate(300, 200)">
    <!-- Soil -->
    <path d="M -50 40 C -30 25, 30 25, 50 40 Z" fill="#8B5A2B" />
    
    <!-- Plant Stem and Leaves -->
    <path d="M 0 35 L 0 -40" stroke="#0F6E56" stroke-width="6" stroke-linecap="round" fill="none" />
    <path d="M 0 -10 C 20 -20, 30 -10, 0 10 Z" fill="#1D9E75" />
    <path d="M 0 -25 C -20 -35, -30 -25, 0 -5 Z" fill="#0F6E56" />
    <path d="M 0 -40 C 15 -55, 25 -45, 0 -25 Z" fill="#1D9E75" />
    
    <!-- Caring Hands (simplified) -->
    <path d="M -70 45 C -50 55, -20 55, -10 40" stroke="#0F6E56" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 70 45 C 50 55, 20 55, 10 40" stroke="#0F6E56" stroke-width="4" stroke-linecap="round" fill="none" />
  </g>
  
  <text x="300" y="340" text-anchor="middle" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#0F6E56">Sapling Distribution &amp; Planting</text>
  <text x="300" y="370" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#1D9E75">Green Initiatives &amp; Environmental Awareness</text>
</svg>
